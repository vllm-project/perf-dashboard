definitions:
  docker-common-b200: &docker-common-b200
    entrypoint: "/bin/bash"
    always-pull: true
    propagate-environment: true
    gpus: all
    environment:
      - HF_HOME=/raid
      - HF_TOKEN
    volumes:
      - /dev/shm:/dev/shm
      - /raid:/raid
    mount-buildkite-agent: true

steps:
- group: "B200 - GPT-OSS-120B"
  steps:
  - label: "B200: openai/gpt-oss-120b - $$IMAGE - FP4 - TP{{ matrix.tensor_parallel_size }} - CONC{{ matrix.concurrency }} - ISL{{ matrix.input_sequence_length }} - OSL{{ matrix.output_sequence_length }}"
    retry:
      manual: true
    agents:
      queue: perf-B200
    priority: 10
    plugins:
      - docker#v5.2.0:
          <<: *docker-common-b200
          image: $IMAGE
          environment:
            - IMAGE=$IMAGE
            - DATE=$DATE
          command:
            - -c
            - |
              ./benchmark/run.sh \
                --image $IMAGE \
                ${DATE:+--date "$DATE"} \
                --model openai/gpt-oss-120b \
                --device b200 \
                --precision fp4 \
                --conc {{ matrix.concurrency }} \
                --isl {{ matrix.input_sequence_length }} \
                --osl {{ matrix.output_sequence_length }} \
                --tp {{ matrix.tensor_parallel_size }} \
                --gpu-mem-util 0.9 \
                --random-range-ratio 1.0 \
                --hf-cache /raid/ \
                --config benchmark/configs/b200_gpt_oss.yaml
    matrix:
      setup:
        concurrency:
          - "4"
          - "8"
          - "16"
          - "32"
          - "64"
        input_sequence_length:
          - "1024"
        output_sequence_length:
          - "1024"
        tensor_parallel_size:
          - "1"
          - "2"
          - "4"
          - "8"
