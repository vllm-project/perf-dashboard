definitions:
  docker-common-b200: &docker-common-b200
    entrypoint: "/bin/bash"
    always-pull: true
    propagate-environment: true
    environment:
      - HF_HOME
      - HF_TOKEN
      - IMAGE=$IMAGE
      - DATE=$DATE
    volumes:
      - /dev/shm:/dev/shm
      - /raid:/raid
    mount-buildkite-agent: true

steps:
- group: "B200 - Qwen3-Next-80B-A3B-Instruct-FP8"
  steps:
  - label: "B200: Qwen3-Next-80B-A3B-Instruct-FP8 - $$IMAGE - FP8 - TP{{ matrix.tensor_parallel_size }} - CONC{{ matrix.concurrency }} - ISL{{ matrix.input_sequence_length }} - OSL{{ matrix.output_sequence_length }}"
    retry:
      manual: true
    agents:
      queue: perf-B200
    priority: 10
    plugins:
      - docker#v5.2.0:
          <<: *docker-common-b200
          image: $IMAGE
          command:
            - -c
            - |
              ./benchmark/run.sh \
                --image $IMAGE \
                --date "$DATE" \
                --model Qwen/Qwen3-Next-80B-A3B-Instruct-FP8 \
                --device b200 \
                --precision fp8 \
                --conc {{ matrix.concurrency }} \
                --isl {{ matrix.input_sequence_length }} \
                --osl {{ matrix.output_sequence_length }} \
                --tp {{ matrix.tensor_parallel_size }} \
                --gpu-mem-util 0.9 \
                --random-range-ratio 1.0
    matrix:
      setup:
        concurrency:
          - "4"
          - "8"
          - "16"
          - "32"
          - "64"
        input_sequence_length:
          - "1024"
        output_sequence_length:
          - "1024"
        tensor_parallel_size:
          - "2"
          - "1"
