definitions:
  docker-common-h200: &docker-common-h200
    entrypoint: "/bin/bash"
    always-pull: true
    propagate-environment: true
    gpus: all
    environment:
      - HF_HOME=/mnt/vllm-ci
      - HF_TOKEN
      - IMAGE=$IMAGE
      - DATE=$DATE
    volumes:
      - /dev/shm:/dev/shm
      - /mnt/vllm-ci:/mnt/vllm-ci
    mount-buildkite-agent: true

steps:
- group: "H200 - GPT-OSS-120B"
  steps:
  - label: "H200: openai/gpt-oss-120b - $$IMAGE - FP4 - TP{{ matrix.tensor_parallel_size }} - CONC{{ matrix.concurrency }} - ISL{{ matrix.input_sequence_length }} - OSL{{ matrix.output_sequence_length }}"
    retry:
      manual: true
    agents:
      queue: perf-h200
    plugins:
      - docker#v5.2.0:
          <<: *docker-common-h200
          image: $IMAGE
          command:
            - -c
            - |
              ./benchmark/run.sh \
                --image $IMAGE \
                --date "$DATE" \
                --model openai/gpt-oss-120b \
                --device h200 \
                --precision fp4 \
                --conc {{ matrix.concurrency }} \
                --isl {{ matrix.input_sequence_length }} \
                --osl {{ matrix.output_sequence_length }} \
                --tp {{ matrix.tensor_parallel_size }} \
                --gpu-mem-util 0.9 \
                --random-range-ratio 1.0 \
                --hf-cache /mnt/vllm-ci/ \
                --config benchmark/configs/h200_gpt_oss.yaml
    matrix:
      setup:
        image:
          - "vllm/vllm-openai:v0.10.2"
        concurrency:
          - "4"
          - "8"
          - "16"
          - "32"
          - "64"
        input_sequence_length:
          - "1024"
        output_sequence_length:
          - "1024"
        tensor_parallel_size:
          - "1"
          - "2"
          - "4"
          - "8"