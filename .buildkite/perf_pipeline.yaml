steps:
- label: "Run benchmark - GPT-OSS-120B FP4"
  retry:
    manual: true
  agents:
    queue: perf-h200
  plugins:
    - docker#v5.2.0:
        image: vllm/vllm-openai:v0.14.0
        entrypoint: "/bin/bash"
        command: ["-c", "./benchmark/run.sh --image vllm/vllm-openai:v0.14.0"]
        always-pull: true
        propagate-environment: true
        gpus: all
        environment:
        - HF_HOME=/dev/shm/
        - HF_TOKEN
        volumes:
        - /dev/shm:/dev/shm
        mount-buildkite-agent: true
