definitions:
  docker-common-h200: &docker-common-h200
    entrypoint: "/bin/bash"
    always-pull: true
    propagate-environment: true
    gpus: all
    environment:
      - HF_HOME=/mnt/vllm-ci
      - HF_TOKEN
    volumes:
      - /dev/shm:/dev/shm
      - /mnt/vllm-ci:/mnt/vllm-ci
    mount-buildkite-agent: true

steps:
- input: "Input information"
  key: input-information
  fields:
    - text: "Image"
      key: "image"
      required: true
    - select: "Config"
      key: "config"
      required: true
      multiple: true
      options:
        - label: "H200 - GPT-OSS-120B"
          value: "h200_gpt_oss_120b"
        - label: "H200 - Qwen3.5-397B-A17B"
          value: "h200_qwen35_397b_a17b"
        - label: "H200 - Qwen3.5-397B-A17B-FP8"
          value: "h200_qwen35_397b_a17b_fp8"

- command: |
    echo "Running benchmark..."
    IMAGE=$(buildkite-agent meta-data get "image")
    CONFIG=$(buildkite-agent meta-data get "config")
    echo "Image: $IMAGE"
    echo "Config: $CONFIG"
    for config in $CONFIG; do
      if [[ $config == "h200_gpt_oss_120b" ]]; then IMAGE=$IMAGE buildkite-agent pipeline upload ./.buildkite/h200_gpt-oss-120b.yaml; fi
      if [[ $config == "h200_qwen35_397b_a17b" ]]; then IMAGE=$IMAGE buildkite-agent pipeline upload ./.buildkite/h200_qwen35-397b-a17b.yaml; fi
      if [[ $config == "h200_qwen35_397b_a17b_fp8" ]]; then IMAGE=$IMAGE buildkite-agent pipeline upload ./.buildkite/h200_qwen35-397b-a17b-fp8.yaml; fi
    done
  agents:
    queue: small_cpu_queue_postmerge
  depends_on: input-information