steps:
- label: "GPT-OSS-120B FP4 - vLLM {{matrix}}"
  retry:
    manual: true
  agents:
    queue: perf-h200
  plugins:
    - docker#v5.2.0:
        image: vllm/vllm-openai:{{matrix}}
        entrypoint: "/bin/bash"
        command: ["-c", "./benchmark/run.sh --image vllm/vllm-openai:{{matrix}}]
        always-pull: true
        propagate-environment: true
        gpus: all
        environment:
        - HF_HOME=/dev/shm/
        - HF_TOKEN
        volumes:
        - /dev/shm:/dev/shm
        mount-buildkite-agent: true
  matrix:
    - "0.10.1"
    - "0.10.1.1"
    - "0.10.2"
    - "0.11.0"
    - "0.11.1"
    - "0.11.2"
    - "0.12.0"
    - "0.13.0"
    - "0.14.0"
    - "0.14.1"
    - "0.15.0"
    - "0.15.1"
