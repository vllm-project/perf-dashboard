steps:
- label: "{{ matrix.model }} FP4 - {{ matrix.image }} - TP{{ matrix.tensor_parallel_size }} - CONC{{ matrix.concurrency }} - ISL{{ matrix.input_sequence_length }} - OSL{{ matrix.output_sequence_length }}"
  retry:
    manual: true
  agents:
    queue: perf-h200
  plugins:
    - docker#v5.2.0:
        image: "{{ matrix.image }}"
        entrypoint: "/bin/bash"
        command: ["-c", "./benchmark/run.sh --image {{ matrix.image }} --model {{ matrix.model }} --conc {{ matrix.concurrency }} --isl {{ matrix.input_sequence_length }} --osl {{ matrix.output_sequence_length }} --tp {{ matrix.tensor_parallel_size }}"]
        always-pull: true
        propagate-environment: true
        gpus: all
        environment:
        - HF_HOME=/dev/shm/
        - HF_TOKEN
        - DATABRICKS_WORKSPACE_URL
        - ZEROBUS_INGEST_URL
        - ACCESS_TOKEN
        - TABLE
        volumes:
        - /dev/shm:/dev/shm
        mount-buildkite-agent: true
  matrix:
    setup:
      image:
        - "vllm/vllm-openai:v0.11.1"
      model:
        - "openai/gpt-oss-120b"
      concurrency:
        - "4"
        - "8"
        - "16"
        - "32"
        - "64"
      input_sequence_length:
        - "1024"
      output_sequence_length:
        - "1024"
      tensor_parallel_size:
        - "1"
        - "2"
        - "4"
        - "8"