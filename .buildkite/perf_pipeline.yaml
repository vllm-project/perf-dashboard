steps:
- label: "GPT-OSS-120B FP4 - vLLM v{{matrix}}"
  retry:
    manual: true
  agents:
    queue: perf-h200
  plugins:
    - docker#v5.2.0:
        image: vllm/vllm-openai:v{{matrix}}
        entrypoint: "/bin/bash"
        command: ["-c", "./benchmark/run.sh --image vllm/vllm-openai:v{{matrix}}"]
        always-pull: true
        propagate-environment: true
        gpus: all
        environment:
        - HF_HOME=/dev/shm/
        - HF_TOKEN
        volumes:
        - /dev/shm:/dev/shm
        mount-buildkite-agent: true
  matrix:
    - "0.10.1"
    - "0.10.1.1"
    - "0.10.2"
    - "0.11.0"
